<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>茹意宝</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="/ruyibao.jpeg" alt="茹意宝" style="height:64px;width:64px;object-fit:cover;border-radius:50%;box-shadow:0 2px 12px rgba(160,120,220,0.4);" />
          <div>
            <h1>茹意宝</h1>
            <p>不是直接讲答案，而是帮助学生在做题时稳住状态。</p>
          </div>
        </div>
        <div class="mode-switch">
          <div id="llmBadge" class="llm-badge">LLM: checking…</div>
          <div class="user-bar" id="userBar">
            <span id="userDisplay" style="font-size:13px;color:var(--muted);"></span>
            <a href="/admin.html" id="adminLink" style="display:none;font-size:13px;">学生管理</a>
            <button class="secondary" id="logoutBtn" style="font-size:12px;padding:6px 10px;">退出</button>
          </div>
          <label>模式</label>
          <select id="modeSelect">
            <option value="practice">练一题</option>
            <option value="exam">考试模式</option>
          </select>
        </div>
      </header>

      <main class="grid">
        <section class="panel question-panel">
          <h2>题目</h2>
          <textarea id="questionInput" rows="7" placeholder="输入一道中考数学题，例如：已知 y = x^2 - 4x + 3，求最小值。"></textarea>
          <div class="row">
            <button id="newSessionBtn">开始新会话</button>
            <button id="loadSummaryBtn" class="secondary">查看复盘</button>
            <button id="submitExamBtn" style="display:none;background:#ef4444;color:#fff;">提交答案</button>
          </div>
          <div id="examBanner" style="display:none;margin-top:10px;padding:10px 14px;background:#fff4e6;border:1px solid #fbbf24;border-radius:10px;font-size:13px;color:#92400e;">
            🔒 考试模式进行中：教练不会给提示，完成后请点击"提交答案"解锁复盘。
          </div>
          <div class="state-card">
            <h3>当前状态</h3>
            <div id="stateView" class="state-list">
              <div>会话：未开始</div>
              <div>用时：0 秒</div>
              <div>提示层级：0</div>
              <div>情绪风险：low</div>
              <div>建议跳题：否</div>
            </div>
          </div>
          <div class="tips-card">
            <h3>快捷输入</h3>
            <div class="quick-actions">
              <button data-text="我不会开始">我不会开始</button>
              <button data-text="我怎么这么笨，我完了">情绪崩溃</button>
              <button data-text="直接给答案吧">直接要答案</button>
              <button data-text="我再试一下，我一定能做出来">死磕</button>
              <button data-text="我算出来是 +1">可能算错</button>
            </div>
          </div>
        </section>

        <section class="panel chat-panel">
          <h2>对话</h2>
          <div id="chatLog" class="chat-log"></div>
          <div class="composer">
            <textarea id="userInput" rows="4" placeholder="输入学生话语，例如：我不知道怎么开始"></textarea>
            <div class="row compact">
              <label>本轮耗时（秒）</label>
              <input id="deltaInput" type="number" min="5" step="5" value="20" />
              <label class="checkbox-label"><input id="markErrorInput" type="checkbox" /> 这一步算错了</label>
            </div>
            <div class="row">
              <button id="sendBtn">发送</button>
            </div>
          </div>
        </section>
      </main>

      <section class="panel summary-panel" id="summaryPanel" hidden>
        <h2>复盘</h2>
        <div id="summaryContent"></div>
      </section>
    </div>

    <script>
      // ---- User auth check ----
      let mcUser = null;
      try { mcUser = JSON.parse(localStorage.getItem('mc_user')); } catch {}
      if (!mcUser || !mcUser.id) {
        window.location.href = '/login.html';
      }
      document.getElementById('userDisplay').textContent = mcUser ? mcUser.displayName : '';
      if (mcUser && mcUser.role === 'teacher') {
        document.getElementById('adminLink').style.display = 'inline';
      }
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('mc_user');
        window.location.href = '/login.html';
      });
    </script>
    <script src="/app.js"></script>
  </body>
</html>
